<!DOCTYPE html>
<html>
    
    <head>
    <title>Icon Template Square</title>
        <style>
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
            }
        </style>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"></script>

    </head>

    <body style="background-color:#F4F0F8;">

        <div class="row">
            <div class="image-container">
                <img id="balloon" src="img/bal.png" onmousedown="this.src='img/bal2.png';" onmouseup="this.src='img/bal.png';" height="200" width="200"/>
            </div>
            <div class="image-container">
                <img id="crystal" src="img/rob.png" onmousedown="this.src='img/rob2.png';" onmouseup="this.src='img/rob.png';" height="200" width="200"/>
            </div>
            <div class="image-container">
                <img id="moon" src="img/moo.png"      onmousedown="this.src='img/moo2.png';" onmouseup="this.src='img/moo.png';" height="220" width="220"/>
            </div>
        </div>

        <div class="row">
            <div class="image-container">
                <img id="hourglass" src="img/hou.png" onmousedown="this.src='img/hou2.png';" onmouseup="this.src='img/hou.png';" height="200" width="200"/>
            </div>
            <div class="image-container">
                <img id="eye" src="img/eye.png" onmousedown="this.src='img/eye2.png';" onmouseup="this.src='img/eye.png';" height="200" width="200"/>
            </div>
            <div class="image-container">
                <img id="cloud" src="img/clo.png" onmousedown="this.src='img/clo2.png';" onmouseup="this.src='img/clo.png';" height="220" width="220"/>
            </div>
        </div>

        <div class="row">
            <div class="image-container">
                <img id="star" src="img/sta.png" onmousedown="this.src='img/sta2.png';" onmouseup="this.src='img/sta.png';" height="220" width="220"/>
            </div>
            <div class="image-container">
                <img id="ripple" src="img/rip.png" onmousedown="this.src='img/rip2.png';" onmouseup="this.src='img/rip.png';" height="220" width="220"/>
            </div>
            <div class="image-container">
                <img id="door" src="img/doo.png" onmousedown="this.src='img/doo2.png';" onmouseup="this.src='img/doo.png';" height="200" width="200"/>
            </div>
        </div>

        <script>

            var soundballoon = new buzz.sound("sound/woosh.mp3");
            var soundmoon = new buzz.sound("sound/moonsound.mp3");
            var soundcrystal = new buzz.sound("sound/glass.mp3");
            var soundhourglass = new buzz.sound("sound/hourglass.mp3");
            var soundcloud = new buzz.sound("sound/cloud.mp3");
            var soundeye = new buzz.sound("sound/eye.mp3");
            var soundstar = new buzz.sound("sound/star.mp3");
            var sounddoor = new buzz.sound("sound/door.mp3");
            var soundripple = new buzz.sound("sound/water.mp3");

            window.onload = function () {

                document.getElementById('balloon').addEventListener('mousedown', function () {soundballoon.play();});
                document.getElementById('moon').addEventListener('mousedown', function () {soundmoon.play();});
                document.getElementById('crystal').addEventListener('mousedown', function () {soundcrystal.play();});
                document.getElementById('hourglass').addEventListener('mousedown', function () {soundhourglass.play();});
                document.getElementById('cloud').addEventListener('mousedown', function () {soundcloud.play();});
                document.getElementById('eye').addEventListener('mousedown', function () {soundeye.play();});
                document.getElementById('star').addEventListener('mousedown', function () {soundstar.play();});
                document.getElementById('door').addEventListener('mousedown', function () {sounddoor.play();});
                document.getElementById('ripple').addEventListener('mousedown', function () {soundripple.play();});

            };
            
        </script>

    </body>
    
</html>
